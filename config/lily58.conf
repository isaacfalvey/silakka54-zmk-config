# Uncomment the following line to enable deep sleep
# CONFIG_ZMK_SLEEP=y

# Uncomment the following line to increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Enable ZMK Studio for Realtime Keymap Updates
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Uncomment the following line to enable USB Logging (this increases power usage by a significant amount, turn it off when not in use)
# CONFIG_ZMK_USB_LOGGING=y

CONFIG_ZMK_DISPLAY=y
# --- DISABLE STOCK GRAPHICS ---
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=n
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# --- CUSTOM LEFT (CENTRAL) HALF WIDGETS ---
# Activates the dense custom dashboard layout framework
CONFIG_NICE_OLED_WIDGET_STATUS=y
# Enables custom graphical element cycling on the primary half
CONFIG_NICE_OLED_WIDGET_ANIMATION=y

# --- CUSTOM RIGHT (PERIPHERAL) HALF WIDGETS ---
# Swaps the default line graphs out for animated assets
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CAT=y
# Bongo Cat typing speed sync: speeds up frames as your actual WPM rises
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=y

# --- OPTIONAL VISUAL INVERSION ---
# If you want a sleek dark mode look (white lines on black background)
# CONFIG_ZMK_DISPLAY_INVERT=y

# --- DISPLAY POWER SLEEP TIMER ---
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
